eyegaze: 
  - window: settings
    settingsPath: home/participant/calibration
    title: Choose your calibration size
    content: |
      <h4>Recommendations:</h4>
      <p> 👶 Young learners → 3/4 </p>
      <p> 🧭 Extra support → 5/6 </p>
      <p> 🎯 Independent use → 6/7 </p>

    shownAreas: [[[1,1],[0,2]]]
    modalArea: [[2,3],[0,2]]
    gridSize: [3, 4]

  - window: settings
    settingsPath: home/participant/calibration
    title: Choose your calibration speed
    content: |
      <h4>Recommendations:</h4>
      <p> 👶 Young learners → Medium </p>
      <p> 🧭 Extra support → Slow </p>
      <p> 🎯 Independent use → Fast </p>
    shownAreas: [[[2,2],[0,2]]]
    modalArea: [[0,1],[0,2]]
    gridSize: [3, 4]

  - window: settings
    settingsPath: home/participant/calibration
    title: Choose your calibration guide
    content: |
      <h4>Recommendations:</h4>
      <p> 👶 Young learners → Balloon </p>
      <p> 🧭 Extra support → Bee </p>
      <p> 🎯 Independent use → Default </p>
    shownAreas: [[[3,3],[0,2]]]
    modalArea: [[1,2],[0,2]]
    gridSize: [3, 4]


  - window: eyeGaze
    title: | 
      Calibration 
      Setup
    content: |
      <p>If Squidly can see your eyes, Squidly can follow where you look. 
      Try to fill up the green bar as much as possible.</p>
    shownAreas: [[[2,3],[0,1]]]
    modalArea: [[0,1],[0,2]]
    gridSize: [3, 4]

  - window: eyeGaze
    title: | 
      Calibration 
      Setup
    content: |
      <p>Make yourself comfortable. Squidly works best when 
      you calibrate in the same position you'll use afterward.</p>
    shownAreas: [[[2,3],[0,1]]]
    modalArea: [[0,1],[0,2]]
    gridSize: [3, 4]

  - window: eyeGaze
    title: | 
      Calibration 
      Setup
    content: |
      <p>When you're ready press calibrate. You will be walked through a guided calibration process.</p>
    shownAreas: [[[2,3],[0,1]], [[2,2],[2,2]]]
    modalArea: [[0,1],[0,2]]
    gridSize: [3, 4]

  - window: eyeGaze
    title: | 
      Calibration 
      Setup
    content: |
      <p>Score below 60? Click Calibrate to try again. Score 60+? You're ready! Click Test.</p>
    shownAreas: [[[2,3],[0,2]]]
    modalArea: [[0,1],[0,2]]
    gridSize: [3, 4]

  - window: settings
    settingsPath: home/participant/access
    title: | 
      Choose your
      dwell time

    content: |
      <h4>Recommendations:</h4>
      <p> 👶 Young learners → 1.2 </p>
      <p> 🧭 Extra support → 1.5 </p>
      <p> 🎯 Independent use → 0.9 </p>
    shownAreas: [[[2,2],[0,2]]]
    modalArea: [[0,1],[0,2]]
    gridSize: [3, 4]

  - window: settings
    settingsPath: home/participant/access
    title: | 
      Choose your
      dwell time

    content: |
      <p> To turn on and off eye-gaze:</p>
      <ul>
        <li>Press <b>"e"</b> on your keyboard</li>
        <li>Open the tool-bar > access and toggle <b>"eye-gaze"</b></li>
      </ul>

    shownAreas: [[[2,2],[0,2]]]
    modalArea: [[0,1],[0,2]]
    gridSize: [3, 4]

  - window: default
    title: |
      You're
      all set!
    content: |
      <p><strong>Yay! You've finished the setup.</strong> Press <b>Finish</b> 
      to return to the home screen and start using Squidly.</p>
    modalArea: [[1,2],[0,2]]
    gridSize: [3, 4]

  



switch:
  - window: settings
    settingsPath: home/participant/access
    title: | 
      Choose your
      switch time

    content: |
      <h4>Recommendations:</h4>
      <p> 👶 Young learners → 1-2 </p>
      <p> 🧭 Extra support → 2-3 </p>
      <p> 🎯 Independent use → 0.7-1 </p>
    shownAreas: [[[1,1],[0,2]]]
    modalArea: [[2,3],[0,2]]
    dwellTestArea: [[0,0],[0,2]]
    gridSize: [3, 4]

  - window: settings
    settingsPath: home/participant/access
    title: | 
      Choose your
      switch time

    content: |
      <p> To start switching:</p>
      <ul>
        <li>Press <b>"x"</b> on your keyboard</li>
        <li>Open the tool-bar > access and toggle <b>"switch"</b></li>
      </ul>

    shownAreas: [[[1,1],[0,2]]]
    modalArea: [[2,3],[0,2]]
    dwellTestArea: [[0,0],[0,2]]
    gridSize: [3, 4]

  - window: settings
    settingsPath: home/participant/access
    title: | 
      Choose your
      switch time

    content: |
      <p> Control switch by:</p>
      <ul>
        <li>Press <b>"space"</b> on your keyboard to select an option.</li>
        <li>Press <b>"backspace"</b> to return from a button group.</li>
        <li>Press <b>"esc"</b>, <b>"x"</b> or click anywhere to end switch.</li>
      </ul>

    shownAreas: [[[1,1],[0,2]]]
    modalArea: [[2,3],[0,2]]
    dwellTestArea: [[0,0],[0,2]]
    gridSize: [3, 4]

  - window: default
    title: |
      You're
      all set!
    content: |
      <p><strong>Yay! You've finished the setup.</strong> Press <b>Finish</b> 
      to return to the home screen and start using Squidly.</p>
    modalArea: [[1,2],[0,2]]
    gridSize: [3, 4]



